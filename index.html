<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auslagerungs-Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            min-height: 100vh;
            padding: 30px 20px;
        }
        h1 {
            text-align: center;
            color: #a8c7fa;
            font-size: 24px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            font-size: 13px;
            margin-bottom: 30px;
        }

        /* EINGABEMASKE */
        .form-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            max-width: 900px;
            margin: 0 auto 30px auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .form-card h2 {
            color: #a8c7fa;
            font-size: 15px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 12px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #a8c7fa; }
        .form-group input::placeholder { color: #444; }

        .btn-add {
            background: #a8c7fa;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-add:hover { background: #c5d8fc; }

        /* AUFTRAGS-TABELLE */
        .table-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            max-width: 900px;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .table-card h2 {
            color: #a8c7fa;
            font-size: 15px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .day-label {
            font-size: 12px;
            color: #555;
            font-weight: normal;
            text-transform: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead th {
            text-align: left;
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px;
            border-bottom: 1px solid #333;
        }
        tbody tr {
            border-bottom: 1px solid #222;
            transition: background 0.15s;
        }
        tbody tr:hover { background: #252525; }
        tbody td {
            padding: 12px 12px;
            color: #ddd;
            font-family: 'Courier New', monospace;
        }
        .td-time {
            color: #ffcc00;
            font-weight: bold;
        }
        .td-urgent {
            color: #ff4444;
            font-weight: bold;
        }
        .no-orders {
            text-align: center;
            color: #444;
            padding: 30px;
            font-size: 14px;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete:hover { border-color: #ff4444; color: #ff4444; }

        /* STATUS */
        .status-bar {
            text-align: center;
            font-size: 12px;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .dot {
            width: 7px; height: 7px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ff00;
        }
    </style>
</head>
<body>

<h1>📦 Auslagerungs-Dashboard</h1>
<p class="subtitle" id="currentDate"></p>

<!-- EINGABEMASKE -->
<div class="form-card">
    <h2>+ Neuer Auslagerungsauftrag</h2>
    <div class="form-row">
        <div class="form-group">
            <label>Artikelnummer</label>
            <input id="inp-artikel" type="text" placeholder="z.B. ART-00123">
        </div>
        <div class="form-group">
            <label>Lagerort</label>
            <input id="inp-lager" type="text" placeholder="z.B. Regal A3">
        </div>
        <div class="form-group">
            <label>Zielort</label>
            <input id="inp-ziel" type="text" placeholder="z.B. Versandzone 2">
        </div>
        <div class="form-group" style="max-width: 130px;">
            <label>Spätestens um</label>
            <input id="inp-time" type="time">
        </div>
        <button class="btn-add" onclick="addOrder()">Hinzufügen</button>
    </div>
</div>

<!-- HEUTE -->
<div class="table-card">
    <h2>
        Heute
        <span class="day-label" id="label-today"></span>
    </h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Artikelnummer</th>
                <th>Lagerort</th>
                <th>Zielort</th>
                <th>Spätestens</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tbody-today">
            <tr><td colspan="6" class="no-orders">Keine Aufträge für heute.</td></tr>
        </tbody>
    </table>
</div>

<!-- MORGEN -->
<div class="table-card">
    <h2>
        Morgen
        <span class="day-label" id="label-tomorrow"></span>
    </h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Artikelnummer</th>
                <th>Lagerort</th>
                <th>Zielort</th>
                <th>Spätestens</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tbody-tomorrow">
            <tr><td colspan="6" class="no-orders">Keine Aufträge für morgen.</td></tr>
        </tbody>
    </table>
</div>

<div class="status-bar">
    <span class="dot"></span> Live-Sync aktiv · Alle Geräte synchronisiert
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-BLAy2LEMup5DKSrlddb7waR2UXko8JA",
    authDomain: "auslagerungsdashboard.firebaseapp.com",
    databaseURL: "https://auslagerungsdashboard-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "auslagerungsdashboard",
    storageBucket: "auslagerungsdashboard.firebasestorage.app",
    messagingSenderId: "1025470327503",
    appId: "1:1025470327503:web:9da16338668a2471a8a5ba"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const ordersRef = ref(db, 'auslagerung/orders');

  // Datum-Hilfsfunktionen
  function toDateStr(date) {
    return date.toISOString().split('T')[0]; // YYYY-MM-DD
  }
  function formatDisplay(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${d}.${m}.${y}`;
  }

  const today = new Date();
  const tomorrow = new Date();
  tomorrow.setDate(today.getDate() + 1);
  const todayStr = toDateStr(today);
  const tomorrowStr = toDateStr(tomorrow);

  // Datum anzeigen
  document.getElementById('currentDate').textContent =
    `Anzeige: ${formatDisplay(todayStr)} – ${formatDisplay(tomorrowStr)}`;
  document.getElementById('label-today').textContent = formatDisplay(todayStr);
  document.getElementById('label-tomorrow').textContent = formatDisplay(tomorrowStr);

  // Auftrag hinzufügen (global verfügbar)
  window.addOrder = function() {
    const artikel = document.getElementById('inp-artikel').value.trim();
    const lager   = document.getElementById('inp-lager').value.trim();
    const ziel    = document.getElementById('inp-ziel').value.trim();
    const time    = document.getElementById('inp-time').value;

    if (!artikel || !lager || !ziel || !time) {
      alert('Bitte alle Felder ausfüllen.');
      return;
    }

    const newOrder = {
      artikel, lager, ziel, time,
      date: todayStr,
      createdAt: Date.now()
    };

    push(ordersRef, newOrder);

    // Felder leeren
    document.getElementById('inp-artikel').value = '';
    document.getElementById('inp-lager').value = '';
    document.getElementById('inp-ziel').value = '';
    document.getElementById('inp-time').value = '';
  };

  // Auftrag löschen (global)
  window.deleteOrder = function(key) {
    const entryRef = ref(db, `auslagerung/orders/${key}`);
    remove(entryRef);
  };

  // Tabelle rendern
  function renderTable(orders, tbodyId) {
    const tbody = document.getElementById(tbodyId);
    if (!orders || orders.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="no-orders">Keine Aufträge.</td></tr>`;
      return;
    }
    // Sortieren nach Uhrzeit
    orders.sort((a, b) => a.time.localeCompare(b.time));

    const now = new Date();
    const nowTime = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    tbody.innerHTML = orders.map((o, i) => {
      const isUrgent = o.date === todayStr && o.time <= nowTime;
      const timeClass = isUrgent ? 'td-urgent' : 'td-time';
      return `
        <tr>
          <td>${i + 1}</td>
          <td>${o.artikel}</td>
          <td>${o.lager}</td>
          <td>${o.ziel}</td>
          <td class="${timeClass}">${o.time} Uhr${isUrgent ? ' ⚠️' : ''}</td>
          <td><button class="btn-delete" onclick="deleteOrder('${o.key}')">Löschen</button></td>
        </tr>`;
    }).join('');
  }

  // Firebase Live-Listener
  onValue(ordersRef, (snapshot) => {
    const data = snapshot.val();
    const allOrders = data
      ? Object.entries(data).map(([key, val]) => ({ ...val, key }))
      : [];

    // Nur heute & morgen anzeigen, alte Daten ignorieren
    const todayOrders    = allOrders.filter(o => o.date === todayStr);
    const tomorrowOrders = allOrders.filter(o => o.date === tomorrowStr);

    renderTable(todayOrders, 'tbody-today');
    renderTable(tomorrowOrders, 'tbody-tomorrow');
  });
</script>

</body>
</html>
